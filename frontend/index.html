<!DOCTYPE html>
<html>
<head>
    <title>AI Code Refine & Optimize</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f6f9;
        }

        /* Textareas styling */
        textarea {
            padding: 10px;
            border-radius: 8px;
        }

        /* Dark / thick input and output boxes */
        #codeInput, #codeOutput {
            background-color: #1f2937; /* dark gray */
            color: #f9fafb;            /* light text */
            font-family: 'Courier New', monospace; /* code font */
            font-weight: bold;          /* thicker letters */
            border: 2px solid #2563eb; /* thicker blue border */
            box-shadow: 2px 2px 8px rgba(0,0,0,0.4); /* subtle shadow */
            padding: 15px;
            border-radius: 8px;
            resize: vertical;          /* allow vertical resize */
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background-color: #2563eb;
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background-color: #1e40af;
        }

        pre {
            text-align: left;
            background: #111827;
            color: #e5e7eb;
            padding: 15px;
            border-radius: 8px;
            width: 80%;
            margin: auto;
            overflow-x: auto;
        }
/* ✅ Floating AI Button (Bottom Right) */
#aiFloating {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

#aiFloating button {
    padding: 12px 20px;
    background: #10a37f;
    color: white;
    border-radius: 25px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
    </style>
</head>

<body>

<h2>AI Code Refine & Optimize</h2>

<div style="display:flex; justify-content:center; gap:40px; margin-top:20px;">

    <div>
        <h3>Enter Code:</h3>
        <textarea id="codeInput" rows="20" cols="60"></textarea>
    </div>

    <div style="display:flex; align-items:center;">
        <button onclick="runCode()">▶ Run</button>
    </div>

    <div>
        <h3>Execution Output:</h3>
        <textarea id="codeOutput" rows="20" cols="60" readonly></textarea>
    </div>

</div>

<br>

<select id="language">
    <option value="python">Python</option>
    <option value="javascript">JavaScript</option>
</select>

<br><br>

<button onclick="reviewCode()">Review</button>
<button onclick="rewriteCode()">Rewrite</button>
<button onclick="optimizeCode()">Optimize</button>

<br><br>

<pre id="output"></pre>

<script>
const API_BASE = "http://127.0.0.1:8000";

async function handleResponse(response) {
    const output = document.getElementById("output");

    if (!response.ok) {
        const error = await response.json();
        output.textContent = "Error: " + error.detail;
        return null;
    }
    return response.json();
}

async function reviewCode() {
    const response = await fetch(API_BASE + "/api/review", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            code: document.getElementById("codeInput").value,
            language: document.getElementById("language").value
        })
    });

    const data = await handleResponse(response);
    if (!data) return;

    document.getElementById("output").textContent =
`REVIEW

Bugs:
${data.review.bugs}

Security:
${data.review.security}

Performance:
${data.review.performance}

Readability:
${data.review.readability}

Rating: ${data.review.rating}/10

Complexity:
${JSON.stringify(data.complexity, null, 2)}
`;
}

async function rewriteCode() {
    const response = await fetch(API_BASE + "/api/rewrite", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            code: document.getElementById("codeInput").value,
            language: document.getElementById("language").value
        })
    });

    const data = await handleResponse(response);
    if (!data) return;

    document.getElementById("output").textContent = data.rewritten_code;
}

async function optimizeCode() {
    const response = await fetch(API_BASE + "/api/optimize", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            code: document.getElementById("codeInput").value,
            language: document.getElementById("language").value
        })
    });

    const data = await handleResponse(response);
    if (!data) return;

    document.getElementById("output").textContent = data.optimized_code;
}

async function runCode() {
    const response = await fetch(API_BASE + "/api/output", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            code: document.getElementById("codeInput").value,
            language: document.getElementById("language").value
        })
    });

    const data = await handleResponse(response);
    if (!data) return;

    document.getElementById("codeOutput").value = data.output;
}
function openAI() {
    const code = document.getElementById("codeInput").value;
    const output = document.getElementById("codeOutput").value;

    // Only trigger if there is an actual runtime error
    if (!output || output.trim() === "" || output.trim() === "Execution timeout") {
        alert("No error detected!");
        return;
    }

    const message = `
I am getting this error when running my code:

${output}

Here is my code:

${code}

Please give a solution.
`;

    const encodedMessage = encodeURIComponent(message);

    // Opens ChatGPT with pre-filled message
    window.open("https://chat.openai.com/?q=" + encodedMessage, "_blank");
}</script>
<!-- ✅ Floating AI Tool -->
<div id="aiFloating">
<button onclick="openAI()">Ask AI</button>
</div>
</body>
</html>
